services:

  postgres:
    image: postgres:16
    container_name: codeforge-postgres
    environment:
      POSTGRES_DB: codeforge
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: codeforge123
    ports:
      - "5433:5432"
    networks:
      - codeforge-network



  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeforge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - codeforge-network

  minio:
    image: minio/minio:latest
    container_name: codeforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - codeforge-network

  grafana:
    image: grafana/grafana:latest
    container_name: codeforge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    networks:
      - codeforge-network

networks:
  codeforge-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  minio_data: